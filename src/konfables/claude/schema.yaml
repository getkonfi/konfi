app: claude
format: json
docs_url: https://docs.anthropic.com/en/docs/claude-code/settings
hints:
  - "claude config — view or modify settings"
  - "settings cascade: project > local > global"
  - "hooks run shell commands at lifecycle events"
sections:
  - name: General
    key: ""
    fields:
      - key: effortLevel
        label: Effort Level
        type: enum
        default: "high"
        description: how much effort Claude puts into responses
        options:
          - low
          - medium
          - high
          - max
      - key: model
        label: Model
        type: string
        default: ""
        description: model override (blank uses default)
        hint: "e.g. claude-sonnet-4-20250514"
      - key: promptSuggestionEnabled
        label: Prompt Suggestions
        type: bool
        default: "true"
        description: show prompt suggestions after responses
      - key: autoUpdatesChannel
        label: Update Channel
        type: enum
        default: "stable"
        description: auto-update release channel
        options:
          - latest
          - stable
      - key: skipDangerousModePermissionPrompt
        label: Skip Dangerous Mode Prompt
        type: bool
        default: "false"
        description: skip the confirmation when entering dangerous mode

  - name: Permissions
    key: permissions
    fields:
      - key: permissions.defaultMode
        label: Default Mode
        type: enum
        default: "default"
        description: permission mode for tool use
        options:
          - default
          - acceptEdits
          - bypassPermissions
          - plan
          - auto
          - dontAsk
      - key: permissions.allow
        label: Allow Rules
        type: list
        default: "[]"
        description: tool patterns to always allow
        hint: 'e.g. Bash(*), Read, Write, Edit'
        widget: patternlist
        options:
          - "Bash(*)"
          - "Bash(git:*)"
          - "Bash(npm:*)"
          - "Bash(make:*)"
          - "Bash(cargo:*)"
          - "Bash(go:*)"
          - "Bash(pip:*)"
          - "Bash(docker:*)"
          - "Read(*)"
          - "Read(~/.config:*)"
          - "Write(*)"
          - "Write(~/.config:*)"
          - "Edit(*)"
          - "Glob(*)"
          - "Grep(*)"
          - "WebFetch(*)"
          - "WebSearch(*)"
          - "Agent(*)"
          - "Skill(*)"
          - "NotebookEdit(*)"
      - key: permissions.deny
        label: Deny Rules
        type: list
        default: "[]"
        description: tool patterns to always deny
        hint: 'e.g. Bash(sudo:*), Bash(rm -rf:*)'
        widget: patternlist
        options:
          - "Bash(*)"
          - "Bash(git:*)"
          - "Bash(npm:*)"
          - "Bash(make:*)"
          - "Bash(cargo:*)"
          - "Bash(go:*)"
          - "Bash(pip:*)"
          - "Bash(docker:*)"
          - "Read(*)"
          - "Read(~/.config:*)"
          - "Write(*)"
          - "Write(~/.config:*)"
          - "Edit(*)"
          - "Glob(*)"
          - "Grep(*)"
          - "WebFetch(*)"
          - "WebSearch(*)"
          - "Agent(*)"
          - "Skill(*)"
          - "NotebookEdit(*)"

  - name: Plugins
    key: ""
    fields:
      - key: enabledPlugins
        label: Enabled Plugins
        type: list
        default: "[]"
        description: map of plugin IDs to enabled state
        hint: "plugin-name@publisher format"
        widget: togglemap
        options:
          - "context7"
          - "sequential-thinking"
          - "memory"

  - name: Hooks
    key: hooks
    fields:
      - key: hooks.PreToolUse
        label: Pre Tool Use
        type: list
        widget: hook
        default: "[]"
        description: hooks that run before each tool invocation
        hint: "matcher field filters by tool name"
        options:
          - "Bash"
          - "Read"
          - "Write"
          - "Edit"
          - "Glob"
          - "Grep"
          - "WebFetch"
          - "Agent"
          - "*"
      - key: hooks.Stop
        label: Stop
        type: list
        widget: hook
        default: "[]"
        description: hooks that run when Claude finishes a response
        options:
          - "*"
      - key: hooks.Notification
        label: Notification
        type: list
        widget: hook
        default: "[]"
        description: hooks that run on notification events
        hint: "matcher: permission_prompt, idle_prompt"
        options:
          - "permission_prompt"
          - "idle_prompt"
          - "*"
      - key: hooks.UserPromptSubmit
        label: User Prompt Submit
        type: list
        widget: hook
        default: "[]"
        description: hooks that run when a user prompt is submitted
        options:
          - "*"
      - key: hooks.SessionStart
        label: Session Start
        type: list
        widget: hook
        default: "[]"
        description: hooks that run at the start of a session
        options:
          - "*"

  - name: Status Line
    key: statusLine
    fields:
      - key: statusLine.type
        label: Type
        type: enum
        default: ""
        description: status line provider type
        options:
          - ""
          - command
      - key: statusLine.command
        label: Command
        type: string
        default: ""
        description: shell command whose stdout becomes the status line
