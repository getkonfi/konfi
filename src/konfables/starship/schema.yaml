app: starship
format: toml
docs_url: "https://starship.rs/config/"
hints:
  - "module variables like $git_branch compose the prompt"
  - "disable_modules to hide individual prompt segments"
  - "palette lets you define reusable color aliases"
sections:
  - name: Prompt
    key: ""
    fields:
      - key: format
        label: Prompt Format
        type: string
        default: "$all"
        description: prompt format string
        example: 'format = "$git_branch$character"'
        hint: use module variables like $git_branch to compose the prompt
        doc_url: "https://starship.rs/config/#prompt"
        since: "0.1.0"
      - key: right_format
        label: Right Format
        type: string
        default: ""
        description: right-side prompt format
        doc_url: "https://starship.rs/config/#prompt"
      - key: continuation_prompt
        label: Continuation Prompt
        type: string
        default: "[∙](bright-black) "
        description: multi-line continuation prompt
        doc_url: "https://starship.rs/config/#prompt"
      - key: scan_timeout
        label: Scan Timeout
        type: number
        default: "30"
        description: file scan timeout (ms)
        min: 1
        max: 5000
        doc_url: "https://starship.rs/config/#prompt"
      - key: command_timeout
        label: Command Timeout
        type: number
        default: "500"
        description: command timeout (ms)
        min: 100
        max: 30000
        doc_url: "https://starship.rs/config/#prompt"
      - key: add_newline
        label: Add Newline
        type: bool
        default: "true"
        description: blank line before prompt
        example: "add_newline = false"
        doc_url: "https://starship.rs/config/#prompt"
        since: "0.1.0"
      - key: palette
        label: Palette
        type: string
        default: ""
        description: active color palette name
        doc_url: "https://starship.rs/config/#prompt"
      - key: character.success_symbol
        label: Success Symbol
        type: string
        widget: stylestring
        default: "[❯](bold green)"
        description: success prompt symbol
        example: 'success_symbol = "[➜](bold green)"'
        hint: supports starship style strings like [text](style)
        doc_url: "https://starship.rs/config/#character"
        since: "0.1.0"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.error_symbol
        label: Error Symbol
        type: string
        widget: stylestring
        default: "[❯](bold red)"
        description: error prompt symbol
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_symbol
        label: Vim Cmd Symbol
        type: string
        widget: stylestring
        default: "[❮](bold green)"
        description: vim normal mode symbol
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_replace_one_symbol
        label: Vim Replace One
        type: string
        widget: stylestring
        default: "[❮](bold purple)"
        description: vim replace-one mode symbol
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_replace_symbol
        label: Vim Replace
        type: string
        widget: stylestring
        default: "[❮](bold purple)"
        description: vim replace mode symbol
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_visual_symbol
        label: Vim Visual
        type: string
        widget: stylestring
        default: "[❮](bold yellow)"
        description: vim visual mode symbol
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable character module
        doc_url: "https://starship.rs/config/#character"
      - key: line_break.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable line_break module
        doc_url: "https://starship.rs/config/#line-break"
      - key: fill.symbol
        label: Symbol
        type: string
        default: "."
        description: fill character
        doc_url: "https://starship.rs/config/#fill"
      - key: fill.style
        label: Style
        type: string
        default: "bold black"
        description: fill style
        doc_url: "https://starship.rs/config/#fill"
      - key: fill.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable fill module
        doc_url: "https://starship.rs/config/#fill"

  - name: Directory
    key: directory
    fields:
      - key: directory.truncation_length
        label: Truncation Length
        type: number
        default: "3"
        description: parent directories shown
        min: 0
        max: 20
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.truncate_to_repo
        label: Truncate to Repo
        type: bool
        default: "true"
        description: truncate at repo root
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.style
        label: Style
        type: string
        default: "bold cyan"
        description: directory style
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.format
        label: Format
        type: string
        default: "[$path]($style)[$read_only]($read_only_style) "
        description: directory format string
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.read_only
        label: Read Only Symbol
        type: string
        default: "🔒"
        description: read-only indicator
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.read_only_style
        label: Read Only Style
        type: string
        default: "red"
        description: read-only style
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.home_symbol
        label: Home Symbol
        type: string
        default: "~"
        description: home directory symbol
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable directory module
        doc_url: "https://starship.rs/config/#directory"

  - name: Git
    key: ""
    fields:
      - key: git_branch.format
        label: Format
        type: string
        default: "on [$symbol$branch(:$remote_branch)]($style) "
        description: git branch format
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.symbol
        label: Symbol
        type: string
        default: " "
        description: branch symbol
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.style
        label: Style
        type: string
        default: "bold purple"
        description: branch style
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.truncation_length
        label: Truncation Length
        type: number
        default: ""
        description: max branch name length (empty = no limit)
        min: 1
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.truncation_symbol
        label: Truncation Symbol
        type: string
        default: "…"
        description: truncation suffix
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.only_attached
        label: Only Attached
        type: bool
        default: "false"
        description: hide when in detached HEAD
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.always_show_remote
        label: Always Show Remote
        type: bool
        default: "false"
        description: always show remote branch
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable git_branch module
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_status.format
        label: Format
        type: string
        default: '([\[$all_status$ahead_behind\]]($style) )'
        description: git status format
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.style
        label: Style
        type: string
        default: "bold red"
        description: git status style
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.stashed
        label: Stashed Symbol
        type: string
        default: "$"
        description: stash symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.ahead
        label: Ahead Symbol
        type: string
        default: "⇡"
        description: ahead symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.behind
        label: Behind Symbol
        type: string
        default: "⇣"
        description: behind symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.diverged
        label: Diverged Symbol
        type: string
        default: "⇕"
        description: diverged symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.conflicted
        label: Conflicted Symbol
        type: string
        default: "="
        description: conflict symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.deleted
        label: Deleted Symbol
        type: string
        default: "✘"
        description: deleted symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.renamed
        label: Renamed Symbol
        type: string
        default: "»"
        description: renamed symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.modified
        label: Modified Symbol
        type: string
        default: "!"
        description: modified symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.staged
        label: Staged Symbol
        type: string
        default: "+"
        description: staged symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.untracked
        label: Untracked Symbol
        type: string
        default: "?"
        description: untracked symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable git_status module
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_commit.format
        label: Format
        type: string
        default: '[\\($hash$tag\\)]($style) '
        description: git commit format
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.commit_hash_length
        label: Hash Length
        type: number
        default: "7"
        description: commit hash display length
        min: 1
        max: 40
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.style
        label: Style
        type: string
        default: "bold green"
        description: commit hash style
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.only_detached
        label: Only Detached
        type: bool
        default: "true"
        description: show only in detached HEAD
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.tag_disabled
        label: Tag Disabled
        type: bool
        default: "true"
        description: hide tag info
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.tag_symbol
        label: Tag Symbol
        type: string
        default: " 🏷 "
        description: tag symbol
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable git_commit module
        doc_url: "https://starship.rs/config/#git-commit"

  - name: Modules
    key: ""
    fields:
      - key: package.format
        label: Format
        type: string
        default: "is [$symbol$version]($style) "
        description: package format
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.symbol
        label: Symbol
        type: string
        default: "📦 "
        description: package symbol
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.style
        label: Style
        type: string
        default: "bold 208"
        description: package style
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.display_private
        label: Display Private
        type: bool
        default: "false"
        description: show private package version
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable package module
        doc_url: "https://starship.rs/config/#package-version"
      - key: battery.format
        label: Format
        type: string
        default: "[$symbol$percentage]($style) "
        description: battery format
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.full_symbol
        label: Full Symbol
        type: string
        default: "🔋 "
        description: full battery symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.charging_symbol
        label: Charging Symbol
        type: string
        default: "⚡ "
        description: charging symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.discharging_symbol
        label: Discharging Symbol
        type: string
        default: "💀 "
        description: discharging symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.unknown_symbol
        label: Unknown Symbol
        type: string
        default: "❓ "
        description: unknown state symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.empty_symbol
        label: Empty Symbol
        type: string
        default: "🪫 "
        description: empty battery symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable battery module
        doc_url: "https://starship.rs/config/#battery"
      - key: cmd_duration.min_time
        label: Min Time
        type: number
        default: "2000"
        description: show after this duration (ms)
        min: 0
        max: 60000
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.format
        label: Format
        type: string
        default: "took [$duration]($style) "
        description: duration format
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.style
        label: Style
        type: string
        default: "bold yellow"
        description: duration style
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.show_milliseconds
        label: Show Milliseconds
        type: bool
        default: "false"
        description: include milliseconds
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.show_notifications
        label: Show Notifications
        type: bool
        default: "false"
        description: desktop notification for long commands
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.min_time_to_notify
        label: Notify Min Time
        type: number
        default: "45000"
        description: notification threshold (ms)
        min: 0
        max: 600000
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable cmd_duration module
        doc_url: "https://starship.rs/config/#command-duration"
      - key: status.format
        label: Format
        type: string
        default: "[$symbol$status]($style) "
        description: status format
        doc_url: "https://starship.rs/config/#status"
      - key: status.symbol
        label: Symbol
        type: string
        default: "✖"
        description: error exit symbol
        doc_url: "https://starship.rs/config/#status"
      - key: status.success_symbol
        label: Success Symbol
        type: string
        default: ""
        description: success exit symbol
        doc_url: "https://starship.rs/config/#status"
      - key: status.not_found_symbol
        label: Not Found Symbol
        type: string
        default: "🔍"
        description: command-not-found symbol
        doc_url: "https://starship.rs/config/#status"
      - key: status.style
        label: Style
        type: string
        default: "bold red"
        description: status style
        doc_url: "https://starship.rs/config/#status"
      - key: status.recognize_signal_code
        label: Recognize Signals
        type: bool
        default: "true"
        description: map exit codes to signal names
        doc_url: "https://starship.rs/config/#status"
      - key: status.map_symbol
        label: Map Symbol
        type: bool
        default: "false"
        description: map exit codes to symbols
        doc_url: "https://starship.rs/config/#status"
      - key: status.disabled
        label: Disabled
        type: bool
        default: "true"
        description: disable status module
        doc_url: "https://starship.rs/config/#status"

  - name: Identity
    key: ""
    fields:
      - key: hostname.ssh_only
        label: SSH Only
        type: bool
        default: "true"
        description: show only in SSH sessions
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.ssh_symbol
        label: SSH Symbol
        type: string
        default: "🌐 "
        description: SSH indicator symbol
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.format
        label: Format
        type: string
        default: "[$ssh_symbol$hostname]($style) in "
        description: hostname format
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.style
        label: Style
        type: string
        default: "bold dimmed green"
        description: hostname style
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.trim_at
        label: Trim At
        type: string
        default: "."
        description: trim hostname at this delimiter
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable hostname module
        doc_url: "https://starship.rs/config/#hostname"
      - key: username.style_root
        label: Root Style
        type: string
        default: "bold red"
        description: root user style
        doc_url: "https://starship.rs/config/#username"
      - key: username.style_user
        label: User Style
        type: string
        default: "bold yellow"
        description: normal user style
        doc_url: "https://starship.rs/config/#username"
      - key: username.format
        label: Format
        type: string
        default: "[$user]($style) in "
        description: username format
        doc_url: "https://starship.rs/config/#username"
      - key: username.show_always
        label: Show Always
        type: bool
        default: "false"
        description: always show username
        doc_url: "https://starship.rs/config/#username"
      - key: username.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable username module
        doc_url: "https://starship.rs/config/#username"

  - name: Time
    key: time
    fields:
      - key: time.format
        label: Format
        type: string
        default: "at [$time]($style) "
        description: time format
        doc_url: "https://starship.rs/config/#time"
      - key: time.style
        label: Style
        type: string
        default: "bold yellow"
        description: time style
        doc_url: "https://starship.rs/config/#time"
      - key: time.time_format
        label: Time Format
        type: string
        default: ""
        description: chrono strftime format
        hint: uses chrono strftime syntax — %T for 24h, %r for 12h
        doc_url: "https://starship.rs/config/#time"
      - key: time.use_12hr
        label: Use 12hr
        type: bool
        default: "false"
        description: 12-hour format
        doc_url: "https://starship.rs/config/#time"
      - key: time.utc_time_offset
        label: UTC Offset
        type: string
        default: local
        description: UTC offset (e.g. +5, -3, local)
        doc_url: "https://starship.rs/config/#time"
      - key: time.time_range
        label: Time Range
        type: string
        default: "-"
        description: visible time range (e.g. 09:00:00-17:00:00)
        doc_url: "https://starship.rs/config/#time"
      - key: time.disabled
        label: Disabled
        type: bool
        default: "true"
        description: disable time module
        doc_url: "https://starship.rs/config/#time"
