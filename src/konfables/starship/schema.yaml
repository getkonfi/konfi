app: starship
format: toml
max_app_version: "1.25.1"
docs_url: "https://starship.rs/config/"
upstream:
  kind: github
  repo: starship/starship
  tag_prefix: v
hints:
  - "starship explain — show active modules and render time"
  - "starship timings — profile slow modules"
  - "starship module <name> — test a single module in isolation"
sections:
  - name: Prompt
    key: ""
    fields:
      - key: format
        label: Prompt Format
        type: string
        default: "$all"
        description: prompt format string — compose with $module variables
        example: 'format = "$directory$git_branch$character"'
        hint: "starship explain — see which modules are active"
        doc_url: "https://starship.rs/config/#prompt"
        since: "0.1.0"
      - key: right_format
        label: Right Format
        type: string
        default: ""
        description: right-side prompt format
        example: 'right_format = "$time$cmd_duration"'
        doc_url: "https://starship.rs/config/#prompt"
      - key: continuation_prompt
        label: Continuation Prompt
        type: string
        default: "[∙](bright-black) "
        description: multi-line continuation prompt
        example: 'continuation_prompt = "[▸](dimmed white) "'
        doc_url: "https://starship.rs/config/#prompt"
      - key: scan_timeout
        label: Scan Timeout
        type: number
        default: "30"
        description: file scan timeout (ms)
        hint: "starship timings — identify slow module scans"
        min: 1
        max: 5000
        doc_url: "https://starship.rs/config/#prompt"
      - key: command_timeout
        label: Command Timeout
        type: number
        default: "500"
        description: external command execution timeout (ms)
        hint: "increase if git modules timeout on large repos"
        min: 100
        max: 30000
        doc_url: "https://starship.rs/config/#prompt"
      - key: add_newline
        label: Add Newline
        type: bool
        default: "true"
        description: blank line before prompt
        example: "add_newline = false"
        doc_url: "https://starship.rs/config/#prompt"
        since: "0.1.0"
      - key: palette
        label: Palette
        type: string
        default: ""
        description: active color palette name
        example: "palette = \"catppuccin_mocha\""
        hint: "define [palettes.name] blocks to map color aliases"
        doc_url: "https://starship.rs/config/#prompt"
      - key: character.success_symbol
        label: Success Symbol
        type: string
        widget: stylestring
        default: "[❯](bold green)"
        description: success prompt symbol
        example: "[character]\nsuccess_symbol = \"[➜](bold green)\""
        hint: "starship module character — preview in isolation"
        doc_url: "https://starship.rs/config/#character"
        since: "0.1.0"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.error_symbol
        label: Error Symbol
        type: string
        widget: stylestring
        default: "[❯](bold red)"
        description: error prompt symbol
        example: "[character]\nerror_symbol = \"[✖](bold red)\""
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_symbol
        label: Vim Cmd Symbol
        type: string
        widget: stylestring
        default: "[❮](bold green)"
        description: vim normal mode symbol
        example: "[character]\nvimcmd_symbol = \"[N](bold cyan)\""
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_replace_one_symbol
        label: Vim Replace One
        type: string
        widget: stylestring
        default: "[❮](bold purple)"
        description: vim replace-one mode symbol
        example: "vimcmd_replace_one_symbol = \"[r](bold purple)\""
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_replace_symbol
        label: Vim Replace
        type: string
        widget: stylestring
        default: "[❮](bold purple)"
        description: vim replace mode symbol
        example: "vimcmd_replace_symbol = \"[R](bold purple)\""
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.vimcmd_visual_symbol
        label: Vim Visual
        type: string
        widget: stylestring
        default: "[❮](bold yellow)"
        description: vim visual mode symbol
        example: "vimcmd_visual_symbol = \"[V](bold yellow)\""
        doc_url: "https://starship.rs/config/#character"
        options: ["❯", "➜", "❮", "▶", "→", "›", "»", "∙", "λ", "$", "⚡"]
        alt_options: ["bold green", "bold red", "bold purple", "bold yellow", "bold cyan", "bold blue", "bold white", "green", "red", "purple", "yellow", "cyan", "dimmed green", "bright-black"]
      - key: character.disabled
        label: Character Disabled
        type: bool
        default: "false"
        description: disable character module
        doc_url: "https://starship.rs/config/#character"
      - key: line_break.disabled
        label: Line Break Disabled
        type: bool
        default: "false"
        description: disable line_break module
        doc_url: "https://starship.rs/config/#line-break"
      - key: fill.symbol
        label: Symbol
        type: string
        default: "."
        description: fill character between left/right prompt
        example: "[fill]\nsymbol = \"─\""
        doc_url: "https://starship.rs/config/#fill"
      - key: fill.style
        label: Style
        type: string
        default: "bold black"
        description: fill style
        example: "style = \"dimmed white\""
        doc_url: "https://starship.rs/config/#fill"
      - key: fill.disabled
        label: Fill Disabled
        type: bool
        default: "false"
        description: disable fill module
        doc_url: "https://starship.rs/config/#fill"

  - name: Directory
    key: directory
    fields:
      - key: directory.truncation_length
        label: Truncation Length
        type: number
        default: "3"
        description: max parent directories shown before truncation
        example: "[directory]\ntruncation_length = 5"
        min: 0
        max: 20
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.truncate_to_repo
        label: Truncate to Repo
        type: bool
        default: "true"
        description: truncate path at git repo root
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.style
        label: Style
        type: string
        default: "bold cyan"
        description: directory path style
        example: "style = \"bold 39\""
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.format
        label: Format
        type: string
        default: "[$path]($style)[$read_only]($read_only_style) "
        description: directory format string
        example: "format = \"[$path]($style) \""
        hint: "starship module directory — preview format output"
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.read_only
        label: Read Only Symbol
        type: string
        default: "🔒"
        description: read-only indicator
        example: "read_only = \" \""
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.read_only_style
        label: Read Only Style
        type: string
        default: "red"
        description: read-only indicator style
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.home_symbol
        label: Home Symbol
        type: string
        default: "~"
        description: home directory replacement symbol
        example: "home_symbol = \"⌂\""
        doc_url: "https://starship.rs/config/#directory"
      - key: directory.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable directory module
        doc_url: "https://starship.rs/config/#directory"

  - name: Git
    key: ""
    fields:
      - key: git_branch.format
        label: Format
        type: string
        default: "on [$symbol$branch(:$remote_branch)]($style) "
        description: git branch format string
        example: "[git_branch]\nformat = \"[$symbol$branch]($style) \""
        hint: "starship module git_branch — preview current branch rendering"
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.symbol
        label: Symbol
        type: string
        default: " "
        description: branch prefix symbol
        example: "symbol = \" \""
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.style
        label: Style
        type: string
        default: "bold purple"
        description: branch name style
        example: "style = \"bold 135\""
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.truncation_length
        label: Truncation Length
        type: number
        default: ""
        description: max branch name length (empty = no limit)
        example: "truncation_length = 20"
        min: 1
        max: 1000
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.truncation_symbol
        label: Truncation Symbol
        type: string
        default: "…"
        description: appended when branch name is truncated
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.only_attached
        label: Only Attached
        type: bool
        default: "false"
        description: hide module in detached HEAD state
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.always_show_remote
        label: Always Show Remote
        type: bool
        default: "false"
        description: always display remote tracking branch
        example: "always_show_remote = true"
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_branch.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable git_branch module
        doc_url: "https://starship.rs/config/#git-branch"
      - key: git_status.format
        label: Format
        type: string
        default: '([\[$all_status$ahead_behind\]]($style) )'
        description: git status format string
        example: "[git_status]\nformat = \"[$all_status$ahead_behind]($style) \""
        hint: "starship module git_status — preview dirty/clean state"
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.style
        label: Style
        type: string
        default: "bold red"
        description: git status style
        example: "style = \"bold 208\""
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.stashed
        label: Stashed Symbol
        type: string
        default: "$"
        description: stash symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.ahead
        label: Ahead Symbol
        type: string
        default: "⇡"
        description: ahead symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.behind
        label: Behind Symbol
        type: string
        default: "⇣"
        description: behind symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.diverged
        label: Diverged Symbol
        type: string
        default: "⇕"
        description: diverged symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.conflicted
        label: Conflicted Symbol
        type: string
        default: "="
        description: conflict symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.deleted
        label: Deleted Symbol
        type: string
        default: "✘"
        description: deleted symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.renamed
        label: Renamed Symbol
        type: string
        default: "»"
        description: renamed symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.modified
        label: Modified Symbol
        type: string
        default: "!"
        description: modified symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.staged
        label: Staged Symbol
        type: string
        default: "+"
        description: staged symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.untracked
        label: Untracked Symbol
        type: string
        default: "?"
        description: untracked symbol
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_status.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable git_status module
        doc_url: "https://starship.rs/config/#git-status"
      - key: git_commit.format
        label: Format
        type: string
        default: '[\\($hash$tag\\)]($style) '
        description: git commit hash format string
        example: "[git_commit]\nformat = \"[$hash]($style) \""
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.commit_hash_length
        label: Hash Length
        type: number
        default: "7"
        description: commit hash display length
        example: "commit_hash_length = 8"
        min: 1
        max: 40
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.style
        label: Style
        type: string
        default: "bold green"
        description: commit hash style
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.only_detached
        label: Only Detached
        type: bool
        default: "true"
        description: only show hash in detached HEAD state
        hint: "set false to always display commit hash"
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.tag_disabled
        label: Tag Disabled
        type: bool
        default: "true"
        description: hide tag info in commit module
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.tag_symbol
        label: Tag Symbol
        type: string
        default: " 🏷 "
        description: tag prefix symbol
        example: "tag_symbol = \" 🔖 \""
        doc_url: "https://starship.rs/config/#git-commit"
      - key: git_commit.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable git_commit module
        doc_url: "https://starship.rs/config/#git-commit"

  - name: Modules
    key: ""
    fields:
      - key: package.format
        label: Format
        type: string
        default: "is [$symbol$version]($style) "
        description: package version format string
        example: "[package]\nformat = \"[$symbol$version]($style) \""
        hint: "starship module package — reads package.json, Cargo.toml, etc."
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.symbol
        label: Symbol
        type: string
        default: "📦 "
        description: package prefix symbol
        example: "symbol = \"pkg \""
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.style
        label: Style
        type: string
        default: "bold 208"
        description: package version style
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.display_private
        label: Display Private
        type: bool
        default: "false"
        description: show version for private packages
        doc_url: "https://starship.rs/config/#package-version"
      - key: package.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable package module
        doc_url: "https://starship.rs/config/#package-version"
      - key: battery.format
        label: Format
        type: string
        default: "[$symbol$percentage]($style) "
        description: battery format string
        example: "[battery]\nformat = \"[$symbol$percentage]($style) \""
        hint: "pair with [[battery.display]] to set threshold styles"
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.full_symbol
        label: Full Symbol
        type: string
        default: "🔋 "
        description: full battery symbol
        example: "full_symbol = \"󰁹 \""
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.charging_symbol
        label: Charging Symbol
        type: string
        default: "⚡ "
        description: charging symbol
        example: "charging_symbol = \"󰂄 \""
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.discharging_symbol
        label: Discharging Symbol
        type: string
        default: "💀 "
        description: discharging symbol
        example: "discharging_symbol = \"󰂃 \""
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.unknown_symbol
        label: Unknown Symbol
        type: string
        default: "❓ "
        description: unknown state symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.empty_symbol
        label: Empty Symbol
        type: string
        default: "🪫 "
        description: empty battery symbol
        doc_url: "https://starship.rs/config/#battery"
      - key: battery.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable battery module
        doc_url: "https://starship.rs/config/#battery"
      - key: cmd_duration.min_time
        label: Min Time
        type: number
        default: "2000"
        description: minimum duration before showing (ms)
        example: "[cmd_duration]\nmin_time = 500"
        min: 0
        max: 60000
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.format
        label: Format
        type: string
        default: "took [$duration]($style) "
        description: duration display format
        example: "format = \"⏱ [$duration]($style) \""
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.style
        label: Style
        type: string
        default: "bold yellow"
        description: duration text style
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.show_milliseconds
        label: Show Milliseconds
        type: bool
        default: "false"
        description: include milliseconds in duration
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.show_notifications
        label: Show Notifications
        type: bool
        default: "false"
        description: desktop notification for long commands
        hint: "requires notify-send or equivalent on your system"
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.min_time_to_notify
        label: Notify Min Time
        type: number
        default: "45000"
        description: desktop notification threshold (ms)
        min: 0
        max: 600000
        doc_url: "https://starship.rs/config/#command-duration"
      - key: cmd_duration.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable cmd_duration module
        doc_url: "https://starship.rs/config/#command-duration"
      - key: status.format
        label: Format
        type: string
        default: "[$symbol$status]($style) "
        description: exit status format string
        example: "[status]\nformat = \"[$symbol$status]($style) \"\ndisabled = false"
        doc_url: "https://starship.rs/config/#status"
      - key: status.symbol
        label: Symbol
        type: string
        default: "✖"
        description: non-zero exit code symbol
        doc_url: "https://starship.rs/config/#status"
      - key: status.success_symbol
        label: Success Symbol
        type: string
        default: ""
        description: exit code 0 symbol (empty = hidden)
        doc_url: "https://starship.rs/config/#status"
      - key: status.not_found_symbol
        label: Not Found Symbol
        type: string
        default: "🔍"
        description: command-not-found (127) symbol
        doc_url: "https://starship.rs/config/#status"
      - key: status.style
        label: Style
        type: string
        default: "bold red"
        description: status module style
        doc_url: "https://starship.rs/config/#status"
      - key: status.recognize_signal_code
        label: Recognize Signals
        type: bool
        default: "true"
        description: translate exit codes to signal names (e.g. SIGKILL)
        doc_url: "https://starship.rs/config/#status"
      - key: status.map_symbol
        label: Map Symbol
        type: bool
        default: "false"
        description: use per-exit-code symbols
        doc_url: "https://starship.rs/config/#status"
      - key: status.disabled
        label: Disabled
        type: bool
        default: "true"
        description: disable status module (disabled by default)
        hint: "set false to show exit codes in prompt"
        doc_url: "https://starship.rs/config/#status"

  - name: Identity
    key: ""
    fields:
      - key: hostname.ssh_only
        label: SSH Only
        type: bool
        default: "true"
        description: only show hostname during SSH sessions
        example: "[hostname]\nssh_only = false"
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.ssh_symbol
        label: SSH Symbol
        type: string
        default: "🌐 "
        description: SSH session indicator
        example: "ssh_symbol = \"🔑 \""
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.format
        label: Format
        type: string
        default: "[$ssh_symbol$hostname]($style) in "
        description: hostname format string
        example: "format = \"[$hostname]($style) \""
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.style
        label: Style
        type: string
        default: "bold dimmed green"
        description: hostname style
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.trim_at
        label: Trim At
        type: string
        default: "."
        description: trim hostname at delimiter (e.g. dev.local -> dev)
        doc_url: "https://starship.rs/config/#hostname"
      - key: hostname.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable hostname module
        doc_url: "https://starship.rs/config/#hostname"
      - key: username.style_root
        label: Root Style
        type: string
        default: "bold red"
        description: style when logged in as root
        doc_url: "https://starship.rs/config/#username"
      - key: username.style_user
        label: User Style
        type: string
        default: "bold yellow"
        description: style for normal user
        doc_url: "https://starship.rs/config/#username"
      - key: username.format
        label: Format
        type: string
        default: "[$user]($style) in "
        description: username format string
        example: "[username]\nformat = \"[$user]($style)@\""
        doc_url: "https://starship.rs/config/#username"
      - key: username.show_always
        label: Show Always
        type: bool
        default: "false"
        description: show username even in local non-root sessions
        doc_url: "https://starship.rs/config/#username"
      - key: username.disabled
        label: Disabled
        type: bool
        default: "false"
        description: disable username module
        doc_url: "https://starship.rs/config/#username"

  - name: Time
    key: time
    fields:
      - key: time.format
        label: Format
        type: string
        default: "at [$time]($style) "
        description: time module format string
        example: "[time]\nformat = \"🕐 [$time]($style) \"\ndisabled = false"
        doc_url: "https://starship.rs/config/#time"
      - key: time.style
        label: Style
        type: string
        default: "bold yellow"
        description: time display style
        doc_url: "https://starship.rs/config/#time"
      - key: time.time_format
        label: Time Format
        type: string
        default: ""
        description: chrono strftime time format
        example: "time_format = \"%H:%M:%S\""
        hint: "chrono strftime — %T = 24h, %r = 12h, %H:%M = hours:mins"
        doc_url: "https://starship.rs/config/#time"
      - key: time.use_12hr
        label: Use 12hr
        type: bool
        default: "false"
        description: use 12-hour clock format
        doc_url: "https://starship.rs/config/#time"
      - key: time.utc_time_offset
        label: UTC Offset
        type: string
        default: local
        description: UTC offset override
        example: "utc_time_offset = \"+9\""
        doc_url: "https://starship.rs/config/#time"
      - key: time.time_range
        label: Time Range
        type: string
        default: "-"
        description: only show time within this range
        example: "time_range = \"09:00:00-17:00:00\""
        doc_url: "https://starship.rs/config/#time"
      - key: time.disabled
        label: Disabled
        type: bool
        default: "true"
        description: disable time module (disabled by default)
        hint: "set false to show clock in prompt"
        doc_url: "https://starship.rs/config/#time"
