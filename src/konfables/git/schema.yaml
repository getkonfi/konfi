app: git
format: ini
schema_version: 1.0.0
docs_url: "https://git-scm.com/docs/git-config"
coverage: partial
hints:
  - "`git config --list` to dump all active settings"
  - "`git config --get <section.key>` to read a single value"
  - "`git config --global <section.key> <value>` to write"

sections:
  - name: User
    key: user
    fields:
      - key: user.name
        label: Name
        type: string
        description: full name for commit authorship
        example: "[user]\n  name = Jane Doe"
        doc_url: "https://git-scm.com/docs/git-config#Documentation/git-config.txt-username"
      - key: user.email
        label: Email
        type: string
        description: email address for commit authorship
        example: "[user]\n  email = jane@example.com"
        doc_url: "https://git-scm.com/docs/git-config#Documentation/git-config.txt-useremail"
      - key: user.signingkey
        label: Signing Key
        type: string
        description: default GPG/SSH signing key
        example: "[user]\n  signingkey = ~/.ssh/id_ed25519.pub"
        hint: "`gpg --list-secret-keys --keyid-format=long` to find GPG key IDs"

  - name: Core
    key: core
    fields:
      - key: core.editor
        label: Editor
        type: string
        default: vim
        description: text editor for commit messages and interactive commands
        example: "[core]\n  editor = nvim"
        hint: "also settable via $EDITOR or $GIT_EDITOR"
      - key: core.autocrlf
        label: Auto CRLF
        type: enum
        default: "false"
        options: ["true", "false", "input"]
        description: automatic line ending conversion
        example: "[core]\n  autocrlf = input"
        hint: "use `input` on Linux/macOS, `true` on Windows"
      - key: core.ignorecase
        label: Ignore Case
        type: bool
        default: "true"
        description: whether the filesystem is case-insensitive
      - key: core.filemode
        label: File Mode
        type: bool
        default: "true"
        description: track file permission changes
        hint: "set false on filesystems that report bogus perms (e.g. NTFS)"
      - key: core.pager
        label: Pager
        type: string
        default: less
        description: pager for command output
        example: "[core]\n  pager = delta"
        hint: "delta, diff-so-fancy, and bat are popular alternatives"
      - key: core.excludesfile
        label: Excludes File
        type: string
        description: global gitignore file path
        widget: path
        example: "[core]\n  excludesfile = ~/.config/git/ignore"
      - key: core.whitespace
        label: Whitespace
        type: string
        description: comma-separated whitespace error detection rules
        example: "[core]\n  whitespace = trailing-space,space-before-tab"

  - name: Init
    key: init
    fields:
      - key: init.defaultBranch
        label: Default Branch
        type: string
        default: master
        description: default branch name for new repositories
        example: "[init]\n  defaultBranch = main"

  - name: Pull
    key: pull
    fields:
      - key: pull.rebase
        label: Rebase
        type: enum
        default: "false"
        options: ["true", "false", "merges", "interactive"]
        description: rebase branches on pull instead of merging
        example: "[pull]\n  rebase = true"
        hint: "`merges` preserves local merge commits during rebase"
      - key: pull.ff
        label: Fast-Forward
        type: enum
        default: "true"
        options: ["true", "false", "only"]
        description: fast-forward strategy for pull
        example: "[pull]\n  ff = only"
        hint: "`only` refuses to pull when fast-forward isn't possible"

  - name: Push
    key: push
    fields:
      - key: push.default
        label: Default
        type: enum
        default: simple
        options: [nothing, current, upstream, tracking, simple, matching]
        description: default push behavior
        example: "[push]\n  default = current"
        hint: "`current` pushes to same-named remote branch without tracking setup"
      - key: push.autoSetupRemote
        label: Auto Setup Remote
        type: bool
        default: "false"
        description: auto-create remote tracking on first push
        example: "[push]\n  autoSetupRemote = true"
        hint: "eliminates the need for `git push -u origin <branch>`"
      - key: push.followTags
        label: Follow Tags
        type: bool
        default: "false"
        description: push annotated tags alongside commits
        example: "[push]\n  followTags = true"

  - name: Merge
    key: merge
    fields:
      - key: merge.tool
        label: Tool
        type: string
        description: merge tool for resolving conflicts
        example: "[merge]\n  tool = nvimdiff"
        hint: "`git mergetool --tool-help` to list available tools"
      - key: merge.conflictstyle
        label: Conflict Style
        type: enum
        default: merge
        options: [merge, diff3, zdiff3]
        description: conflict marker style
        example: "[merge]\n  conflictstyle = zdiff3"
        hint: "`zdiff3` adds common ancestor context and compacts markers"
      - key: merge.ff
        label: Fast-Forward
        type: enum
        default: "true"
        options: ["true", "false", "only"]
        description: fast-forward merge strategy

  - name: Diff
    key: diff
    fields:
      - key: diff.tool
        label: Tool
        type: string
        description: external diff tool
        example: "[diff]\n  tool = nvimdiff"
        hint: "`git difftool --tool-help` to list available tools"
      - key: diff.colorMoved
        label: Color Moved
        type: enum
        default: "no"
        options: ["no", "default", "plain", "blocks", "zebra", "dimmed-zebra"]
        description: highlight moved lines in diff output
        example: "[diff]\n  colorMoved = dimmed-zebra"
      - key: diff.algorithm
        label: Algorithm
        type: enum
        default: myers
        options: [myers, minimal, patience, histogram]
        description: diff algorithm
        example: "[diff]\n  algorithm = histogram"
        hint: "`histogram` generally produces cleaner diffs on large changes"

  - name: Rebase
    key: rebase
    fields:
      - key: rebase.autoStash
        label: Auto Stash
        type: bool
        default: "false"
        description: auto stash/unstash dirty worktree during rebase
        example: "[rebase]\n  autoStash = true"
      - key: rebase.autoSquash
        label: Auto Squash
        type: bool
        default: "false"
        description: auto-reorder fixup!/squash! commits in interactive rebase
        example: "[rebase]\n  autoSquash = true"
        hint: "pairs with `git commit --fixup=<sha>`"

  - name: Fetch
    key: fetch
    fields:
      - key: fetch.prune
        label: Prune
        type: bool
        default: "false"
        description: remove stale remote-tracking branches on fetch
        example: "[fetch]\n  prune = true"
      - key: fetch.pruneTags
        label: Prune Tags
        type: bool
        default: "false"
        description: remove tags that no longer exist on remote
        example: "[fetch]\n  pruneTags = true"

  - name: Color
    key: color
    fields:
      - key: color.ui
        label: UI
        type: enum
        default: auto
        options: ["true", "false", "auto", "always", "never"]
        description: colorize git output
        example: "[color]\n  ui = auto"
      - key: color.diff.meta
        label: Diff Meta
        type: string
        default: ""
        description: style for diff metadata lines
        example: "[color \"diff\"]\n  meta = yellow bold"
      - key: color.diff.frag
        label: Diff Frag
        type: string
        default: ""
        description: style for diff hunk headers
        example: "[color \"diff\"]\n  frag = magenta bold"

  - name: Commit
    key: commit
    fields:
      - key: commit.gpgSign
        label: GPG Sign
        type: bool
        default: "false"
        description: auto-sign all commits with GPG/SSH
        example: "[commit]\n  gpgSign = true"
        hint: "requires user.signingkey and gpg.format to be set"
      - key: commit.template
        label: Template
        type: string
        widget: path
        default: ""
        description: path to default commit message template
        example: "[commit]\n  template = ~/.config/git/commit-template"
      - key: commit.verbose
        label: Verbose
        type: bool
        default: "false"
        description: show diff in commit message editor
        example: "[commit]\n  verbose = true"

  - name: Credential
    key: credential
    fields:
      - key: credential.helper
        label: Helper
        type: string
        description: credential storage helper
        example: "[credential]\n  helper = store"
        hint: "`git credential-cache`, `store`, `osxkeychain`, or `manager` (GCM)"

  - name: GPG
    key: gpg
    fields:
      - key: gpg.format
        label: Format
        type: enum
        default: openpgp
        options: [openpgp, x509, ssh]
        description: signing key format
        example: "[gpg]\n  format = ssh"
        hint: "`ssh` is simplest for GitHub verified commits without GPG tooling"
      - key: gpg.program
        label: Program
        type: string
        default: ""
        description: path to GPG executable
        example: "[gpg]\n  program = /usr/bin/gpg2"

  - name: Rerere
    key: rerere
    fields:
      - key: rerere.enabled
        label: Enabled
        type: bool
        default: "false"
        description: record and reuse conflict resolutions
        example: "[rerere]\n  enabled = true"
        hint: "saves time on long-lived topic branches with repeated rebases"
      - key: rerere.autoUpdate
        label: Auto Update
        type: bool
        default: "false"
        description: auto-stage rerere-resolved files
        example: "[rerere]\n  autoUpdate = true"
