app: rio
format: toml
schema_version: 1.0.0
min_app_version: "0.1.0"
max_app_version: "0.2.0"
docs_url: "https://rioterm.com/docs/config"
hints:
  - "TOML config — sections are [tables], nested via dots"
  - "live reload on save — no restart needed"
  - "rio --version — check installed version"
sections:
  # -- Cursor -----------------------------------------------------------
  - name: Cursor
    key: cursor
    fields:
      - key: cursor
        label: Cursor Shape
        type: enum
        default: Block
        description: cursor shape
        example: "cursor = \"Beam\""
        options: [Block, Underline, Beam]
        doc_url: "https://rioterm.com/docs/config#cursor"
      - key: blinking-cursor
        label: Blinking Cursor
        type: bool
        default: "false"
        description: enable cursor blinking
        example: "blinking-cursor = true"
        doc_url: "https://rioterm.com/docs/config#blinking-cursor"

  # -- Padding ----------------------------------------------------------
  - name: Padding
    key: padding
    fields:
      - key: padding-x
        label: Padding X
        type: number
        default: "0"
        description: horizontal padding in pixels
        example: "padding-x = 10"
        min: 0
        max: 200
        doc_url: "https://rioterm.com/docs/config#padding-x"
      - key: padding-y
        label: Padding Y
        type: number
        default: "0"
        description: vertical padding in pixels
        example: "padding-y = 5"
        min: 0
        max: 200
        doc_url: "https://rioterm.com/docs/config#padding-y"

  # -- Window -----------------------------------------------------------
  - name: Window
    key: window
    fields:
      - key: option-as-alt
        label: Option as Alt
        type: enum
        default: none
        description: macOS option key behavior
        example: "option-as-alt = \"both\""
        options: [left, right, both]
        doc_url: "https://rioterm.com/docs/config#option-as-alt"
      - key: window-opacity
        label: Window Opacity
        type: number
        widget: slider
        default: "1.0"
        description: background opacity (needs compositor on linux)
        example: "window-opacity = 0.95"
        min: 0
        max: 1
        doc_url: "https://rioterm.com/docs/config#window-opacity"
      - key: window-decorations
        label: Window Decorations
        type: enum
        default: Enabled
        description: window decoration style
        example: "window-decorations = \"Transparent\""
        options: [Enabled, Disabled, Transparent, Buttonless]
        doc_url: "https://rioterm.com/docs/config#window-decorations"
      - key: confirm-before-quit
        label: Confirm Before Quit
        type: bool
        default: "true"
        description: prompt before closing terminal
        example: "confirm-before-quit = false"
        doc_url: "https://rioterm.com/docs/config#confirm-before-quit"

  # -- Renderer ---------------------------------------------------------
  - name: Renderer
    key: renderer
    fields:
      - key: renderer.performance
        label: Performance
        type: enum
        default: High
        description: GPU performance mode (Low saves battery)
        example: "[renderer]\nperformance = \"High\""
        options: [High, Low]
        doc_url: "https://rioterm.com/docs/config#renderer"
      - key: renderer.backend
        label: Backend
        type: enum
        default: Automatic
        description: graphics API backend
        example: "[renderer]\nbackend = \"Vulkan\""
        hint: "Automatic selects the best for your platform"
        options: [Automatic, Vulkan, GL, DX12, Metal]
        doc_url: "https://rioterm.com/docs/config#renderer"

  # -- Fonts ------------------------------------------------------------
  - name: Fonts
    key: fonts
    fields:
      - key: fonts.family
        label: Font Family
        type: string
        widget: font
        default: cascadiacode
        description: primary font family
        example: "[fonts]\nfamily = \"JetBrains Mono\""
        hint: "fc-list : family | sort — list available fonts"
        doc_url: "https://rioterm.com/docs/config#fonts"
      - key: fonts.size
        label: Font Size
        type: number
        default: "18"
        description: font size in points
        example: "[fonts]\nsize = 14"
        min: 6
        max: 72
        doc_url: "https://rioterm.com/docs/config#fonts"
      - key: fonts.extras
        label: Extra Fonts
        type: string
        default: ""
        description: fallback font families
        example: "[fonts]\nextras = [{family = \"Noto Color Emoji\"}]"
        doc_url: "https://rioterm.com/docs/config#fonts"

  # -- Scroll -----------------------------------------------------------
  - name: Scroll
    key: scroll
    fields:
      - key: scroll.multiplier
        label: Scroll Multiplier
        type: number
        default: "3.0"
        description: scroll speed multiplier
        example: "[scroll]\nmultiplier = 5.0"
        min: 1
        max: 50
        doc_url: "https://rioterm.com/docs/config#scroll"
      - key: scroll.divider
        label: Scroll Divider
        type: number
        default: "1.0"
        description: scroll speed divider (higher = slower)
        example: "[scroll]\ndivider = 2.0"
        min: 1
        max: 50
        doc_url: "https://rioterm.com/docs/config#scroll"

  # -- Navigation -------------------------------------------------------
  - name: Navigation
    key: navigation
    fields:
      - key: navigation.mode
        label: Navigation Mode
        type: enum
        default: Bookmark
        description: tab navigation style
        example: "[navigation]\nmode = \"Bookmark\""
        options: [Bookmark, NativeTab, TopTab, BottomTab, Plain]
        doc_url: "https://rioterm.com/docs/config#navigation"
      - key: navigation.clickable
        label: Clickable Tabs
        type: bool
        default: "true"
        description: allow clicking tabs to switch
        example: "[navigation]\nclickable = true"
        doc_url: "https://rioterm.com/docs/config#navigation"

  # -- Colors -----------------------------------------------------------
  - name: Colors
    key: colors
    fields:
      - key: colors.background
        label: Background
        type: color
        default: "#0F0D0E"
        description: terminal background color
        example: "[colors]\nbackground = \"#1a1b26\""
        palette:
          - "#0F0D0E"
          - "#1a1b26"
          - "#282828"
          - "#1e1e2e"
          - "#002b36"
        doc_url: "https://rioterm.com/docs/config#colors"
      - key: colors.foreground
        label: Foreground
        type: color
        default: "#F9F4DA"
        description: default text color
        example: "[colors]\nforeground = \"#c0caf5\""
        palette:
          - "#F9F4DA"
          - "#ebdbb2"
          - "#c0caf5"
          - "#cdd6f4"
          - "#839496"
        doc_url: "https://rioterm.com/docs/config#colors"
      - key: colors.tabs-active
        label: Active Tab
        type: color
        default: "#F38BA3"
        description: active tab highlight color
        example: "[colors]\ntabs-active = \"#7aa2f7\""
        doc_url: "https://rioterm.com/docs/config#colors"
      - key: colors.cursor
        label: Cursor Color
        type: color
        default: "#F38BA3"
        description: cursor color
        example: "[colors]\ncursor = \"#f7768e\""
        doc_url: "https://rioterm.com/docs/config#colors"
      - key: colors.selection-foreground
        label: Selection FG
        type: color
        default: "#0F0D0E"
        description: text color in selections
        example: "[colors]\nselection-foreground = \"#1a1b26\""
        doc_url: "https://rioterm.com/docs/config#colors"
      - key: colors.selection-background
        label: Selection BG
        type: color
        default: "#F9F4DA"
        description: background color in selections
        example: "[colors]\nselection-background = \"#33467c\""
        doc_url: "https://rioterm.com/docs/config#colors"

  # -- Developer --------------------------------------------------------
  - name: Developer
    key: developer
    fields:
      - key: developer.log-level
        label: Log Level
        type: enum
        default: "OFF"
        description: log verbosity for debugging
        example: "[developer]\nlog-level = \"INFO\""
        hint: "logs go to stderr — redirect with rio 2> rio.log"
        options: ["OFF", ERROR, WARN, INFO, DEBUG, TRACE]
        doc_url: "https://rioterm.com/docs/config#developer"
      - key: developer.enable-fps-counter
        label: FPS Counter
        type: bool
        default: "false"
        description: show FPS overlay (for renderer debugging)
        example: "[developer]\nenable-fps-counter = true"
        doc_url: "https://rioterm.com/docs/config#developer"
