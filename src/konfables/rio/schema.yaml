app: rio
format: toml
schema_version: 1.0.0
min_app_version: "0.1.0"
max_app_version: "0.2.0"
docs_url: "https://raphamorim.io/rio/docs/"
hints:
  - "TOML config — sections are [tables], nested via dots"
  - "live reload on save — no restart needed"
sections:
  # -- Cursor -----------------------------------------------------------
  - name: Cursor
    key: cursor
    fields:
      - key: cursor
        label: Cursor Shape
        type: enum
        default: Block
        description: cursor shape
        options: [Block, Underline, Beam]
        doc_url: "https://raphamorim.io/rio/docs/#cursor"
      - key: blinking-cursor
        label: Blinking Cursor
        type: bool
        default: "false"
        description: enable cursor blinking
        doc_url: "https://raphamorim.io/rio/docs/#blinking-cursor"

  # -- Padding ----------------------------------------------------------
  - name: Padding
    key: padding
    fields:
      - key: padding-x
        label: Padding X
        type: number
        default: "0"
        description: horizontal padding in pixels
        min: 0
        max: 200
        doc_url: "https://raphamorim.io/rio/docs/#padding-x"
      - key: padding-y
        label: Padding Y
        type: number
        default: "0"
        description: vertical padding in pixels
        min: 0
        max: 200
        doc_url: "https://raphamorim.io/rio/docs/#padding-y"

  # -- Window -----------------------------------------------------------
  - name: Window
    key: window
    fields:
      - key: option-as-alt
        label: Option as Alt
        type: enum
        default: none
        description: macOS option key behavior
        options: [left, right, both, none]
        doc_url: "https://raphamorim.io/rio/docs/#option-as-alt"
      - key: window-opacity
        label: Window Opacity
        type: number
        widget: slider
        default: "1.0"
        description: background opacity
        min: 0
        max: 1
        doc_url: "https://raphamorim.io/rio/docs/#window-opacity"
      - key: window-decorations
        label: Window Decorations
        type: enum
        default: Enabled
        description: window decoration style
        options: [Enabled, Disabled, Transparent, Buttonless]
        doc_url: "https://raphamorim.io/rio/docs/#window-decorations"
      - key: confirm-before-quit
        label: Confirm Before Quit
        type: bool
        default: "true"
        description: ask before closing terminal
        doc_url: "https://raphamorim.io/rio/docs/#confirm-before-quit"

  # -- Renderer ---------------------------------------------------------
  - name: Renderer
    key: renderer
    fields:
      - key: renderer.performance
        label: Performance
        type: enum
        default: High
        description: rendering performance mode
        options: [High, Low]
        doc_url: "https://raphamorim.io/rio/docs/#renderer"
      - key: renderer.backend
        label: Backend
        type: enum
        default: Automatic
        description: graphics backend
        options: [Automatic, Vulkan, GL, DX12, Metal]
        doc_url: "https://raphamorim.io/rio/docs/#renderer"

  # -- Fonts ------------------------------------------------------------
  - name: Fonts
    key: fonts
    fields:
      - key: fonts.family
        label: Font Family
        type: string
        widget: font
        default: cascadiacode
        description: primary font family
        doc_url: "https://raphamorim.io/rio/docs/#fonts"
      - key: fonts.size
        label: Font Size
        type: number
        default: "18"
        description: font size in points
        min: 6
        max: 72
        doc_url: "https://raphamorim.io/rio/docs/#fonts"
      - key: fonts.extras
        label: Extra Fonts
        type: string
        default: ""
        description: additional font families for fallback
        doc_url: "https://raphamorim.io/rio/docs/#fonts"

  # -- Scroll -----------------------------------------------------------
  - name: Scroll
    key: scroll
    fields:
      - key: scroll.multiplier
        label: Scroll Multiplier
        type: number
        default: "3.0"
        description: scroll speed multiplier
        min: 1
        max: 50
        doc_url: "https://raphamorim.io/rio/docs/#scroll"
      - key: scroll.divider
        label: Scroll Divider
        type: number
        default: "1.0"
        description: scroll speed divider
        min: 1
        max: 50
        doc_url: "https://raphamorim.io/rio/docs/#scroll"

  # -- Navigation -------------------------------------------------------
  - name: Navigation
    key: navigation
    fields:
      - key: navigation.mode
        label: Navigation Mode
        type: enum
        default: CollapsedTab
        description: tab bar navigation mode
        options: [CollapsedTab, NativeTab, Breadcrumb, TopTab, BottomTab, Plain]
        doc_url: "https://raphamorim.io/rio/docs/#navigation"
      - key: navigation.clickable
        label: Clickable Tabs
        type: bool
        default: "true"
        description: enable clickable tab navigation
        doc_url: "https://raphamorim.io/rio/docs/#navigation"

  # -- Colors -----------------------------------------------------------
  - name: Colors
    key: colors
    fields:
      - key: colors.background
        label: Background
        type: color
        default: "#0F0D0E"
        description: terminal background color
        palette:
          - "#0F0D0E"
          - "#1a1b26"
          - "#282828"
          - "#1e1e2e"
          - "#002b36"
        doc_url: "https://raphamorim.io/rio/docs/#colors"
      - key: colors.foreground
        label: Foreground
        type: color
        default: "#F9F4DA"
        description: terminal foreground color
        palette:
          - "#F9F4DA"
          - "#ebdbb2"
          - "#c0caf5"
          - "#cdd6f4"
          - "#839496"
        doc_url: "https://raphamorim.io/rio/docs/#colors"
      - key: colors.tabs-active
        label: Active Tab
        type: color
        default: "#F38BA3"
        description: active tab color
        doc_url: "https://raphamorim.io/rio/docs/#colors"
      - key: colors.cursor
        label: Cursor Color
        type: color
        default: "#F38BA3"
        description: cursor color
        doc_url: "https://raphamorim.io/rio/docs/#colors"
      - key: colors.selection-foreground
        label: Selection FG
        type: color
        default: "#0F0D0E"
        description: selection foreground
        doc_url: "https://raphamorim.io/rio/docs/#colors"
      - key: colors.selection-background
        label: Selection BG
        type: color
        default: "#F9F4DA"
        description: selection background
        doc_url: "https://raphamorim.io/rio/docs/#colors"

  # -- Developer --------------------------------------------------------
  - name: Developer
    key: developer
    fields:
      - key: developer.log-level
        label: Log Level
        type: enum
        default: "OFF"
        description: developer log verbosity
        options: ["OFF", ERROR, WARN, INFO, DEBUG, TRACE]
        doc_url: "https://raphamorim.io/rio/docs/#developer"
      - key: developer.enable-fps-counter
        label: FPS Counter
        type: bool
        default: "false"
        description: display frames per second counter
        doc_url: "https://raphamorim.io/rio/docs/#developer"
