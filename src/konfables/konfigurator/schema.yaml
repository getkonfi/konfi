app: konfigurator
format: yaml
hints:
  - konfigurator's own settings
  - theme changes apply immediately
sections:
  - name: Appearance
    key: ""
    fields:
      - key: theme
        label: Theme
        type: enum
        default: catppuccin
        description: color palette for the TUI
        options:
          - catppuccin
          - tokyonight
          - gruvbox
          - nord
  - name: Logging
    key: ""
    fields:
      - key: log_level
        label: Log Level
        type: enum
        default: info
        description: minimum log level written to the log file
        options:
          - trace
          - debug
          - info
          - warn
          - error
