app: alacritty
format: toml
schema_version: 1.0.0
min_app_version: "0.13.0"
max_app_version: "1.0.0"
docs_url: "https://alacritty.org/config-alacritty.html"
hints:
  - "TOML config — sections are [tables], nested via dots"
  - "live reload on save — no restart needed"
  - "debug: alacritty --print-events, alacritty -v / -vv / -vvv"
  - "config path: $XDG_CONFIG_HOME/alacritty/alacritty.toml"
sections:
  # ── Font ────────────────────────────────────────────────────────────
  - name: Font
    key: font
    fields:
      - key: font.normal.family
        label: Font Family
        type: string
        widget: font
        default: monospace
        description: primary font family
        example: '[font.normal]\nfamily = "JetBrains Mono"'
        hint: "fc-list : family | sort — platform defaults: linux=monospace, macos=Menlo"
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.normal.style
        label: Font Style
        type: string
        default: Regular
        description: normal font style
        example: '[font.normal]\nstyle = "Medium"'
        hint: "fc-list \"JetBrains Mono\" : style — lists available styles"
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold.family
        label: Bold Font
        type: string
        widget: font
        default: ""
        description: bold font override (empty = same as normal)
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold.style
        label: Bold Style
        type: string
        default: Bold
        description: bold font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.italic.family
        label: Italic Font
        type: string
        widget: font
        default: ""
        description: italic font override (empty = same as normal)
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.italic.style
        label: Italic Style
        type: string
        default: Italic
        description: italic font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold_italic.family
        label: Bold Italic Font
        type: string
        widget: font
        default: ""
        description: bold-italic font override (empty = same as normal)
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold_italic.style
        label: Bold Italic Style
        type: string
        default: Bold Italic
        description: bold-italic font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.size
        label: Font Size
        type: number
        default: "11.25"
        description: font size in points
        example: '[font]\nsize = 14.0'
        min: 1
        max: 72
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.offset.x
        label: Letter Spacing
        type: number
        default: "0"
        description: extra horizontal spacing (px)
        example: '[font.offset]\nx = 1'
        min: -10
        max: 20
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.offset.y
        label: Line Spacing
        type: number
        default: "0"
        description: extra vertical spacing (px)
        example: '[font.offset]\ny = 2'
        min: -10
        max: 20
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.glyph_offset.x
        label: Glyph Offset X
        type: number
        default: "0"
        description: glyph horizontal offset (px)
        min: -10
        max: 10
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.glyph_offset.y
        label: Glyph Offset Y
        type: number
        default: "0"
        description: glyph vertical offset (px)
        min: -10
        max: 10
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.builtin_box_drawing
        label: Builtin Box Drawing
        type: bool
        default: "true"
        description: use built-in box drawing and powerline glyphs
        hint: "disable if your nerd font has better box-drawing glyphs"
        doc_url: "https://alacritty.org/config-alacritty.html#font"

  # ── Colors ────────────────────────────────────────────────────────────
  - name: Colors
    key: colors
    fields:
      - key: colors.primary.background
        label: Background
        type: color
        default: "#181818"
        description: default background color
        example: '[colors.primary]\nbackground = "#1d2021"'
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
        palette:
          - "#181818"
          - "#1d2021"
          - "#282828"
          - "#1a1b26"
          - "#24283b"
          - "#002b36"
          - "#011628"
          - "#0d1117"
          - "#1e1e2e"
          - "#000000"
      - key: colors.primary.foreground
        label: Foreground
        type: color
        default: "#d8d8d8"
        description: foreground color
        example: '[colors.primary]\nforeground = "#ebdbb2"'
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
        palette:
          - "#d8d8d8"
          - "#ebdbb2"
          - "#c0caf5"
          - "#a9b1d6"
          - "#839496"
          - "#93a1a1"
          - "#cdd6f4"
          - "#d5c4a1"
          - "#c6d0f5"
          - "#f8f8f2"
      - key: colors.primary.dim_foreground
        label: Dim Foreground
        type: color
        default: "#828482"
        description: dimmed foreground color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.draw_bold_text_with_bright_colors
        label: Bold as Bright
        type: bool
        default: "false"
        description: bold text uses bright color variants
        hint: "maps SGR bold (\\e[1m) to bright ANSI palette"
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.transparent_background_colors
        label: Transparent BG Colors
        type: bool
        default: "false"
        description: apply opacity to all cell backgrounds
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.cursor.text
        label: Cursor Text
        type: string
        default: CellBackground
        description: text color under cursor
        example: '[colors.cursor]\ntext = CellBackground\ncursor = "#f0c674"'
        hint: "CellForeground | CellBackground | #hex"
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.cursor.cursor
        label: Cursor Color
        type: string
        default: CellForeground
        description: cursor color
        hint: "CellForeground | CellBackground | #hex"
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.selection.text
        label: Selection Text
        type: string
        default: CellBackground
        description: selection text color
        example: '[colors.selection]\ntext = CellBackground\nbackground = "#44475a"'
        hint: "CellForeground | CellBackground | #hex"
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.selection.background
        label: Selection BG
        type: string
        default: CellForeground
        description: selection background color
        hint: "CellForeground | CellBackground | #hex"
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.black
        label: Black
        type: color
        default: "#181818"
        description: normal black (ANSI 0)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.red
        label: Red
        type: color
        default: "#ac4242"
        description: normal red (ANSI 1)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.green
        label: Green
        type: color
        default: "#90a959"
        description: normal green (ANSI 2)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.yellow
        label: Yellow
        type: color
        default: "#f4bf75"
        description: normal yellow (ANSI 3)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.blue
        label: Blue
        type: color
        default: "#6a9fb5"
        description: normal blue (ANSI 4)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.magenta
        label: Magenta
        type: color
        default: "#aa759f"
        description: normal magenta (ANSI 5)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.cyan
        label: Cyan
        type: color
        default: "#75b5aa"
        description: normal cyan (ANSI 6)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.white
        label: White
        type: color
        default: "#d8d8d8"
        description: normal white (ANSI 7)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.black
        label: Bright Black
        type: color
        default: "#6b6b6b"
        description: bright black (ANSI 8)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.red
        label: Bright Red
        type: color
        default: "#c55555"
        description: bright red (ANSI 9)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.green
        label: Bright Green
        type: color
        default: "#aac474"
        description: bright green (ANSI 10)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.yellow
        label: Bright Yellow
        type: color
        default: "#feca88"
        description: bright yellow (ANSI 11)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.blue
        label: Bright Blue
        type: color
        default: "#82b8c8"
        description: bright blue (ANSI 12)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.magenta
        label: Bright Magenta
        type: color
        default: "#c28cb8"
        description: bright magenta (ANSI 13)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.cyan
        label: Bright Cyan
        type: color
        default: "#93d3c3"
        description: bright cyan (ANSI 14)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.white
        label: Bright White
        type: color
        default: "#f8f8f8"
        description: bright white (ANSI 15)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"

  # ── Window ────────────────────────────────────────────────────────────
  - name: Window
    key: window
    fields:
      - key: window.opacity
        label: Opacity
        type: number
        widget: slider
        default: "1.0"
        description: background opacity
        example: '[window]\nopacity = 0.9'
        min: 0
        max: 1
        hint: "requires compositor (picom, hyprland, sway) — no effect on bare X11"
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.blur
        label: Blur
        type: bool
        default: "false"
        description: blur behind transparent window
        hint: macOS and KDE Wayland only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.padding.x
        label: Padding X
        type: number
        default: "0"
        description: horizontal padding (px, DPI-scaled)
        example: '[window.padding]\nx = 8\ny = 4'
        min: 0
        max: 200
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.padding.y
        label: Padding Y
        type: number
        default: "0"
        description: vertical padding (px, DPI-scaled)
        min: 0
        max: 200
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.dynamic_padding
        label: Dynamic Padding
        type: bool
        default: "false"
        description: balance padding around content
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.decorations
        label: Decorations
        type: enum
        default: Full
        description: window decoration style
        example: '[window]\ndecorations = "None"'
        options: [Full, None, Transparent, Buttonless]
        hint: "None for tiling WMs — Transparent/Buttonless are macOS only"
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.startup_mode
        label: Startup Mode
        type: enum
        default: Windowed
        description: initial window mode
        options: [Windowed, Maximized, Fullscreen, SimpleFullscreen]
        hint: SimpleFullscreen is macOS only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.title
        label: Title
        type: string
        default: Alacritty
        description: default window title
        example: '[window]\ntitle = "term"'
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.dynamic_title
        label: Dynamic Title
        type: bool
        default: "true"
        description: programs can change window title via OSC escape
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.resize_increments
        label: Resize Increments
        type: bool
        default: "false"
        description: resize in cell-sized steps
        hint: macOS and X11 only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.decorations_theme_variant
        label: Theme Variant
        type: enum
        default: None
        description: theme variant for window decorations
        options: [Dark, Light, None]
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.dimensions.columns
        label: Columns
        type: number
        default: "0"
        description: initial window width in columns (0 = auto)
        example: '[window.dimensions]\ncolumns = 120\nlines = 40'
        min: 0
        max: 1000
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.dimensions.lines
        label: Lines
        type: number
        default: "0"
        description: initial window height in lines (0 = auto)
        min: 0
        max: 1000
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.option_as_alt
        label: Option as Alt
        type: enum
        default: None
        description: treat macOS Option key as Alt
        options: [OnlyLeft, OnlyRight, Both, None]
        hint: macOS only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: scrolling.history
        label: History
        type: number
        default: "10000"
        description: max scrollback lines (0 = disabled)
        example: '[scrolling]\nhistory = 50000'
        min: 0
        max: 100000
        hint: "high values increase memory — set 0 when using tmux scrollback"
        doc_url: "https://alacritty.org/config-alacritty.html#scrolling"
      - key: scrolling.multiplier
        label: Multiplier
        type: number
        default: "3"
        description: lines per scroll event
        min: 1
        max: 50
        doc_url: "https://alacritty.org/config-alacritty.html#scrolling"

  # ── Cursor ────────────────────────────────────────────────────────────
  - name: Cursor
    key: cursor
    fields:
      - key: cursor.style.shape
        label: Shape
        type: enum
        default: Block
        description: cursor shape
        example: '[cursor.style]\nshape = "Beam"\nblinking = "On"'
        options: [Block, Underline, Beam]
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.style.blinking
        label: Blinking
        type: enum
        default: "Off"
        description: cursor blink behavior
        options: [Never, "Off", "On", Always]
        hint: "Off/On respect DECSCUSR from shell — Never/Always override it"
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.blink_interval
        label: Blink Interval
        type: number
        default: "750"
        description: blink interval (ms)
        min: 50
        max: 5000
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.blink_timeout
        label: Blink Timeout
        type: number
        default: "5"
        description: stop blinking after N seconds (0 = never)
        min: 0
        max: 60
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.unfocused_hollow
        label: Unfocused Hollow
        type: bool
        default: "true"
        description: hollow cursor when unfocused
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.thickness
        label: Thickness
        type: number
        widget: slider
        default: "0.15"
        description: beam/underline thickness (fraction of cell)
        min: 0
        max: 1
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"

  # ── Terminal ──────────────────────────────────────────────────────────
  - name: Terminal
    key: terminal
    fields:
      - key: mouse.hide_when_typing
        label: Hide When Typing
        type: bool
        default: "false"
        description: hide mouse while typing
        doc_url: "https://alacritty.org/config-alacritty.html#mouse"
      - key: terminal.shell.program
        label: Shell Program
        type: string
        widget: path
        default: ""
        description: shell executable (empty = $SHELL)
        example: '[terminal.shell]\nprogram = "/usr/bin/zsh"\nargs = ["-l"]'
        hint: "echo $SHELL — or use /usr/bin/fish, /usr/bin/nu, etc."
        doc_url: "https://alacritty.org/config-alacritty.html#terminal"
      - key: terminal.shell.args
        label: Shell Args
        type: list
        default: ""
        description: arguments passed to shell on launch
        example: '[terminal.shell]\nargs = ["--login"]'
        doc_url: "https://alacritty.org/config-alacritty.html#terminal"
      - key: terminal.osc52
        label: OSC 52
        type: enum
        default: OnlyCopy
        description: clipboard access via OSC 52 escape
        options: [Disabled, OnlyCopy, OnlyPaste, CopyPaste]
        hint: "needed for remote clipboard (ssh + neovim/tmux)"
        doc_url: "https://alacritty.org/config-alacritty.html#terminal"

  # ── General ───────────────────────────────────────────────────────────
  - name: General
    key: general
    fields:
      - key: general.live_config_reload
        label: Live Config Reload
        type: bool
        default: "true"
        description: auto-reload config on save
        doc_url: "https://alacritty.org/config-alacritty.html#general"
      - key: general.ipc_socket
        label: IPC Socket
        type: bool
        default: "true"
        description: enable IPC socket (unix only)
        hint: "alacritty msg -s $ALACRITTY_SOCKET config -w 0 \"font.size=16\""
        doc_url: "https://alacritty.org/config-alacritty.html#general"
      - key: general.working_directory
        label: Working Directory
        type: string
        widget: path
        default: None
        description: shell working directory (None = inherit)
        example: '[general]\nworking_directory = "/home/user/projects"'
        doc_url: "https://alacritty.org/config-alacritty.html#general"
      - key: general.import
        label: Import
        type: list
        default: ""
        description: import additional config files
        example: '[general]\nimport = [\n  "~/.config/alacritty/themes/gruvbox_dark.toml",\n]'
        hint: "theme files: github.com/alacritty/alacritty-theme"
        doc_url: "https://alacritty.org/config-alacritty.html#general"

  - name: Selection
    key: selection
    fields:
      - key: selection.save_to_clipboard
        label: Save to Clipboard
        type: bool
        default: "false"
        description: auto-copy selection to clipboard
        hint: "like X11 PRIMARY selection — select text to copy, middle-click to paste"
        doc_url: "https://alacritty.org/config-alacritty.html#selection"
      - key: selection.semantic_escape_chars
        label: Word Boundary
        type: string
        default: ",│`|:\"' ()[]{}<>\\t"
        description: word boundary chars for double-click selection
        example: '[selection]\nsemantic_escape_chars = ",│`|:\"''()[]{}<>\\t/"'
        doc_url: "https://alacritty.org/config-alacritty.html#selection"

  - name: Bell
    key: bell
    fields:
      - key: bell.animation
        label: Animation
        type: enum
        default: Linear
        description: visual bell flash easing
        options: [Ease, EaseOut, EaseOutSine, EaseOutQuad, EaseOutCubic, EaseOutQuart, EaseOutQuint, EaseOutExpo, EaseOutCirc, Linear]
        doc_url: "https://alacritty.org/config-alacritty.html#bell"
      - key: bell.duration
        label: Duration
        type: number
        default: "0"
        description: visual bell flash duration (ms, 0 = disabled)
        example: '[bell]\nduration = 100\nanimation = "EaseOutQuad"'
        min: 0
        max: 5000
        hint: "test with: printf '\\a'"
        doc_url: "https://alacritty.org/config-alacritty.html#bell"
      - key: bell.color
        label: Color
        type: color
        default: "#ffffff"
        description: visual bell flash color
        doc_url: "https://alacritty.org/config-alacritty.html#bell"
