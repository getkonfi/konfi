app: alacritty
format: toml
schema_version: 1.0.0
min_app_version: "0.13.0"
max_app_version: "1.0.0"
docs_url: "https://alacritty.org/config-alacritty.html"
hints:
  - "TOML config — sections are [tables], nested via dots"
  - "live reload on save — no restart needed"
  - "import other config files with import = [paths]"
sections:
  # ── Font ────────────────────────────────────────────────────────────
  - name: Font
    key: font
    fields:
      - key: font.normal.family
        label: Font Family
        type: string
        widget: font
        default: monospace
        description: primary font family
        example: '[font.normal]\nfamily = "JetBrains Mono"'
        hint: linux/bsd=monospace, macos=Menlo, windows=Consolas
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.normal.style
        label: Font Style
        type: string
        default: Regular
        description: normal font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold.family
        label: Bold Font
        type: string
        widget: font
        default: ""
        description: bold font family
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold.style
        label: Bold Style
        type: string
        default: Bold
        description: bold font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.italic.family
        label: Italic Font
        type: string
        widget: font
        default: ""
        description: italic font family
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.italic.style
        label: Italic Style
        type: string
        default: Italic
        description: italic font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold_italic.family
        label: Bold Italic Font
        type: string
        widget: font
        default: ""
        description: bold-italic font family
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.bold_italic.style
        label: Bold Italic Style
        type: string
        default: Bold Italic
        description: bold-italic font style
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.size
        label: Font Size
        type: number
        default: "11.25"
        description: font size in points
        min: 1
        max: 72
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.offset.x
        label: Letter Spacing
        type: number
        default: "0"
        description: extra horizontal spacing (px)
        min: -10
        max: 20
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.offset.y
        label: Line Spacing
        type: number
        default: "0"
        description: extra vertical spacing (px)
        min: -10
        max: 20
        doc_url: "https://alacritty.org/config-alacritty.html#font"
      - key: font.builtin_box_drawing
        label: Builtin Box Drawing
        type: bool
        default: "true"
        description: use built-in box drawing and powerline glyphs
        doc_url: "https://alacritty.org/config-alacritty.html#font"

  # ── Colors ────────────────────────────────────────────────────────────
  - name: Colors
    key: colors
    fields:
      - key: colors.primary.background
        label: Background
        type: color
        default: "#181818"
        description: default background color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
        palette:
          - "#181818"
          - "#1d2021"
          - "#282828"
          - "#1a1b26"
          - "#24283b"
          - "#002b36"
          - "#011628"
          - "#0d1117"
          - "#1e1e2e"
          - "#000000"
      - key: colors.primary.foreground
        label: Foreground
        type: color
        default: "#d8d8d8"
        description: foreground color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
        palette:
          - "#d8d8d8"
          - "#ebdbb2"
          - "#c0caf5"
          - "#a9b1d6"
          - "#839496"
          - "#93a1a1"
          - "#cdd6f4"
          - "#d5c4a1"
          - "#c6d0f5"
          - "#f8f8f2"
      - key: colors.primary.dim_foreground
        label: Dim Foreground
        type: color
        default: "#828482"
        description: dimmed foreground color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.draw_bold_text_with_bright_colors
        label: Bold as Bright
        type: bool
        default: "false"
        description: bold text uses bright color variants
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.transparent_background_colors
        label: Transparent BG Colors
        type: bool
        default: "false"
        description: apply opacity to all cell backgrounds
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.cursor.text
        label: Cursor Text
        type: enum
        default: CellBackground
        description: text color under cursor
        options: [CellForeground, CellBackground]
        hint: or a hex color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.cursor.cursor
        label: Cursor Color
        type: enum
        default: CellForeground
        description: cursor color
        options: [CellForeground, CellBackground]
        hint: or a hex color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.selection.text
        label: Selection Text
        type: enum
        default: CellBackground
        description: selection text color
        options: [CellForeground, CellBackground]
        hint: or a hex color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.selection.background
        label: Selection BG
        type: enum
        default: CellForeground
        description: selection background color
        options: [CellForeground, CellBackground]
        hint: or a hex color
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.black
        label: Black
        type: color
        default: "#181818"
        description: normal black (ANSI 0)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.red
        label: Red
        type: color
        default: "#ac4242"
        description: normal red (ANSI 1)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.green
        label: Green
        type: color
        default: "#90a959"
        description: normal green (ANSI 2)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.yellow
        label: Yellow
        type: color
        default: "#f4bf75"
        description: normal yellow (ANSI 3)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.blue
        label: Blue
        type: color
        default: "#6a9fb5"
        description: normal blue (ANSI 4)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.magenta
        label: Magenta
        type: color
        default: "#aa759f"
        description: normal magenta (ANSI 5)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.cyan
        label: Cyan
        type: color
        default: "#75b5aa"
        description: normal cyan (ANSI 6)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.normal.white
        label: White
        type: color
        default: "#d8d8d8"
        description: normal white (ANSI 7)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.black
        label: Bright Black
        type: color
        default: "#6b6b6b"
        description: bright black (ANSI 8)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.red
        label: Bright Red
        type: color
        default: "#c55555"
        description: bright red (ANSI 9)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.green
        label: Bright Green
        type: color
        default: "#aac474"
        description: bright green (ANSI 10)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.yellow
        label: Bright Yellow
        type: color
        default: "#feca88"
        description: bright yellow (ANSI 11)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.blue
        label: Bright Blue
        type: color
        default: "#82b8c8"
        description: bright blue (ANSI 12)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.magenta
        label: Bright Magenta
        type: color
        default: "#c28cb8"
        description: bright magenta (ANSI 13)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.cyan
        label: Bright Cyan
        type: color
        default: "#93d3c3"
        description: bright cyan (ANSI 14)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"
      - key: colors.bright.white
        label: Bright White
        type: color
        default: "#f8f8f8"
        description: bright white (ANSI 15)
        doc_url: "https://alacritty.org/config-alacritty.html#colors"

  # ── Window ────────────────────────────────────────────────────────────
  - name: Window
    key: window
    fields:
      - key: window.opacity
        label: Opacity
        type: number
        widget: slider
        default: "1.0"
        description: background opacity
        min: 0
        max: 1
        hint: requires compositing
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.blur
        label: Blur
        type: bool
        default: "false"
        description: blur behind transparent window
        hint: macOS and KDE Wayland only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.padding.x
        label: Padding X
        type: number
        default: "0"
        description: horizontal padding (px, DPI-scaled)
        min: 0
        max: 200
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.padding.y
        label: Padding Y
        type: number
        default: "0"
        description: vertical padding (px, DPI-scaled)
        min: 0
        max: 200
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.dynamic_padding
        label: Dynamic Padding
        type: bool
        default: "false"
        description: balance padding around content
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.decorations
        label: Decorations
        type: enum
        default: Full
        description: window decoration style
        options: [Full, None, Transparent, Buttonless]
        hint: Transparent and Buttonless are macOS only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.startup_mode
        label: Startup Mode
        type: enum
        default: Windowed
        description: initial window mode
        options: [Windowed, Maximized, Fullscreen, SimpleFullscreen]
        hint: SimpleFullscreen is macOS only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.title
        label: Title
        type: string
        default: Alacritty
        description: window title text
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.dynamic_title
        label: Dynamic Title
        type: bool
        default: "true"
        description: programs can change window title
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.resize_increments
        label: Resize Increments
        type: bool
        default: "false"
        description: resize in cell-sized steps
        hint: macOS and X11 only
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: window.decorations_theme_variant
        label: Theme Variant
        type: enum
        default: None
        description: theme variant for window decorations
        options: [Dark, Light, None]
        doc_url: "https://alacritty.org/config-alacritty.html#window"
      - key: scrolling.history
        label: History
        type: number
        default: "10000"
        description: max scrollback lines
        min: 0
        max: 100000
        doc_url: "https://alacritty.org/config-alacritty.html#scrolling"
      - key: scrolling.multiplier
        label: Multiplier
        type: number
        default: "3"
        description: lines per scroll
        min: 1
        max: 50
        doc_url: "https://alacritty.org/config-alacritty.html#scrolling"

  # ── Cursor ────────────────────────────────────────────────────────────
  - name: Cursor
    key: cursor
    fields:
      - key: cursor.style.shape
        label: Shape
        type: enum
        default: Block
        description: cursor shape
        options: [Block, Underline, Beam]
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.style.blinking
        label: Blinking
        type: enum
        default: "Off"
        description: cursor blink behavior
        options: [Never, "Off", "On", Always]
        hint: "Off/On=togglable, Never/Always=locked"
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.blink_interval
        label: Blink Interval
        type: number
        default: "750"
        description: blink interval (ms)
        min: 50
        max: 5000
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.blink_timeout
        label: Blink Timeout
        type: number
        default: "5"
        description: stop blinking after N seconds (0 = never)
        min: 0
        max: 60
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.unfocused_hollow
        label: Unfocused Hollow
        type: bool
        default: "true"
        description: hollow cursor when unfocused
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"
      - key: cursor.thickness
        label: Thickness
        type: number
        widget: slider
        default: "0.15"
        description: beam/underline thickness (fraction of cell)
        min: 0
        max: 1
        doc_url: "https://alacritty.org/config-alacritty.html#cursor"

  # ── Terminal ──────────────────────────────────────────────────────────
  - name: Terminal
    key: terminal
    fields:
      - key: mouse.hide_when_typing
        label: Hide When Typing
        type: bool
        default: "false"
        description: hide mouse while typing
        doc_url: "https://alacritty.org/config-alacritty.html#mouse"
      - key: terminal.shell.program
        label: Shell Program
        type: string
        widget: path
        default: ""
        description: shell executable path
        hint: empty = $SHELL or login shell
        doc_url: "https://alacritty.org/config-alacritty.html#terminal"
      - key: terminal.osc52
        label: OSC 52
        type: enum
        default: OnlyCopy
        description: OSC 52 clipboard access
        options: [Disabled, OnlyCopy, OnlyPaste, CopyPaste]
        doc_url: "https://alacritty.org/config-alacritty.html#terminal"

  # ── General ───────────────────────────────────────────────────────────
  - name: General
    key: general
    fields:
      - key: general.live_config_reload
        label: Live Config Reload
        type: bool
        default: "true"
        description: auto-reload config on save
        doc_url: "https://alacritty.org/config-alacritty.html#general"
      - key: general.ipc_socket
        label: IPC Socket
        type: bool
        default: "true"
        description: enable IPC socket (unix only)
        doc_url: "https://alacritty.org/config-alacritty.html#general"
      - key: general.working_directory
        label: Working Directory
        type: string
        widget: path
        default: None
        description: shell working directory
        hint: set to "None" or an absolute path
        doc_url: "https://alacritty.org/config-alacritty.html#general"
