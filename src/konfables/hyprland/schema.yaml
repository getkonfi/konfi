app: hyprland
format: hyprland
schema_version: "0.51.0"
min_app_version: "0.40.0"
max_app_version: "0.51.0"
docs_url: "https://wiki.hypr.land/Configuring/Variables/"
hints:
  - "brace-block config — key = value inside named blocks"
  - "supports dynamic reloading via hyprctl reload"
  - "use $VAR = value for variables, source = path for includes"
sections:
  - name: General
    key: general
    fields:
      - key: general.border_size
        label: Border Size
        type: number
        default: "1"
        description: window border width (px)
        min: 0
        max: 20
        example: "border_size = 2"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.gaps_in
        label: Inner Gaps
        type: number
        default: "5"
        description: gaps between windows (px)
        min: 0
        max: 200
        hint: "e.g. 5 or 5,10,15,20 (top,right,bottom,left)"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.gaps_out
        label: Outer Gaps
        type: number
        default: "20"
        description: gaps to monitor edges (px)
        min: 0
        max: 200
        hint: "e.g. 20 or 10,20,10,20"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.layout
        label: Layout
        type: enum
        default: dwindle
        description: tiling layout
        options: [dwindle, master, scrolling, monocle]
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.no_focus_fallback
        label: No Focus Fallback
        type: bool
        default: "false"
        description: disable focus fallback
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.resize_on_border
        label: Resize on Border
        type: bool
        default: "false"
        description: click-drag resize on borders
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.extend_border_grab_area
        label: Border Grab Area
        type: number
        default: "15"
        description: border grab area extension (px)
        min: 0
        max: 100
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.hover_icon_on_border
        label: Hover Icon on Border
        type: bool
        default: "true"
        description: show resize cursor on border hover
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.allow_tearing
        label: Allow Tearing
        type: bool
        default: "false"
        description: allow screen tearing
        hint: requires windowrule for specific windows
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.resize_corner
        label: Resize Corner
        type: number
        default: "0"
        description: force resize corner for floating windows (0 = disable)
        min: 0
        max: 4
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.col.active_border
        label: Active Border Color
        type: color
        default: "0xffffffff"
        description: active window border color
        hint: "gradient syntax: rgba(...) rgba(...) 45deg"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.col.inactive_border
        label: Inactive Border Color
        type: color
        default: "0xff444444"
        description: inactive window border color
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"
      - key: general.gaps_workspaces
        label: Workspace Gaps
        type: number
        default: "0"
        description: gaps between workspaces (stacks with gaps_out)
        min: 0
        max: 200
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#general"

  - name: Decoration
    key: decoration
    fields:
      - key: decoration.rounding
        label: Corner Rounding
        type: number
        default: "0"
        description: corner rounding radius (px)
        min: 0
        max: 50
        example: "rounding = 10"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.rounding_power
        label: Rounding Power
        type: number
        default: "2.0"
        description: rounding curve shape
        min: 1
        max: 10
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.active_opacity
        label: Active Opacity
        type: number
        widget: slider
        default: "1.0"
        description: active window opacity
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.inactive_opacity
        label: Inactive Opacity
        type: number
        widget: slider
        default: "1.0"
        description: inactive window opacity
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.fullscreen_opacity
        label: Fullscreen Opacity
        type: number
        widget: slider
        default: "1.0"
        description: fullscreen window opacity
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.dim_inactive
        label: Dim Inactive
        type: bool
        default: "false"
        description: dim inactive windows
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.dim_strength
        label: Dim Strength
        type: number
        widget: slider
        default: "0.5"
        description: inactive window dim amount
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.dim_special
        label: Dim Special
        type: number
        widget: slider
        default: "0.2"
        description: dim amount for special workspace
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.dim_around
        label: Dim Around
        type: number
        widget: slider
        default: "0.4"
        description: dim_around window rule strength
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.screen_shader
        label: Screen Shader
        type: string
        widget: path
        default: ""
        description: custom screen shader path
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#decoration"
      - key: decoration.shadow.enabled
        label: Shadows Enabled
        type: bool
        default: "true"
        description: enable window shadows
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.shadow.range
        label: Shadow Range
        type: number
        default: "4"
        description: shadow range (px)
        min: 1
        max: 100
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.shadow.render_power
        label: Shadow Render Power
        type: number
        default: "3"
        description: shadow falloff power (1-4)
        min: 1
        max: 4
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.shadow.sharp
        label: Sharp Shadow
        type: bool
        default: "false"
        description: sharp shadows (no falloff)
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.shadow.color
        label: Shadow Color
        type: color
        default: "0xee1a1a1a"
        description: shadow color (alpha = opacity)
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.shadow.color_inactive
        label: Shadow Color Inactive
        type: color
        default: ""
        description: inactive shadow color
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.shadow.scale
        label: Shadow Scale
        type: number
        widget: slider
        default: "1.0"
        description: shadow scale factor
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#shadow"
      - key: decoration.blur.enabled
        label: Blur Enabled
        type: bool
        default: "true"
        description: enable kawase background blur
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.size
        label: Blur Size
        type: number
        default: "8"
        description: blur kernel size
        min: 1
        max: 30
        hint: increase passes when increasing size to avoid artifacts
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.passes
        label: Blur Passes
        type: number
        default: "1"
        description: blur passes
        min: 1
        max: 10
        hint: more passes = heavier blur, more GPU cost
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.ignore_opacity
        label: Blur Ignore Opacity
        type: bool
        default: "true"
        description: blur ignores window opacity
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.new_optimizations
        label: Blur Optimizations
        type: bool
        default: "true"
        description: extra blur optimizations
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.xray
        label: Blur X-Ray
        type: bool
        default: "false"
        description: floats ignore tiled windows in blur
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.noise
        label: Blur Noise
        type: number
        widget: slider
        default: "0.0117"
        description: blur noise amount
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.contrast
        label: Blur Contrast
        type: number
        widget: slider
        default: "0.8916"
        description: blur contrast
        min: 0
        max: 2
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.brightness
        label: Blur Brightness
        type: number
        widget: slider
        default: "0.8172"
        description: blur brightness
        min: 0
        max: 2
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.vibrancy
        label: Blur Vibrancy
        type: number
        widget: slider
        default: "0.1696"
        description: blur vibrancy (saturation boost)
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.vibrancy_darkness
        label: Vibrancy Darkness
        type: number
        widget: slider
        default: "0.0"
        description: vibrancy in dark areas
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.special
        label: Blur Special WS
        type: bool
        default: "false"
        description: blur special workspace (GPU-heavy)
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"
      - key: decoration.blur.popups
        label: Blur Popups
        type: bool
        default: "false"
        description: blur popups
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#blur"

  - name: Animations
    key: animations
    fields:
      - key: animations.enabled
        label: Animations Enabled
        type: bool
        default: "true"
        description: enable animations
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#animations"
      - key: animations.workspace_wraparound
        label: Workspace Wraparound
        type: bool
        default: "false"
        description: wrap animations between first/last workspace
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#animations"

  - name: Input
    key: input
    fields:
      - key: input.sensitivity
        label: Mouse Sensitivity
        type: number
        widget: slider
        default: "0.0"
        description: mouse sensitivity (on top of libinput)
        min: -1
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.accel_profile
        label: Accel Profile
        type: enum
        default: ""
        description: acceleration profile
        options: ["", adaptive, flat, custom]
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.force_no_accel
        label: Force No Accel
        type: bool
        default: "false"
        description: disable acceleration
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.left_handed
        label: Left Handed
        type: bool
        default: "false"
        description: swap mouse buttons
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.scroll_method
        label: Scroll Method
        type: enum
        default: ""
        description: scroll method
        options: ["", 2fg, edge, on_button_down, no_scroll]
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.scroll_button
        label: Scroll Button
        type: number
        default: "0"
        description: button code for on_button_down scroll
        min: 0
        max: 999
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.scroll_button_lock
        label: Scroll Button Lock
        type: bool
        default: "false"
        description: toggle scroll button (no hold needed)
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.scroll_factor
        label: Scroll Factor
        type: number
        default: "1.0"
        description: scroll speed multiplier
        min: 0.1
        max: 10
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.natural_scroll
        label: Natural Scroll
        type: bool
        default: "false"
        description: natural (inverted) scrolling
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.follow_mouse
        label: Follow Mouse
        type: enum
        default: "1"
        description: focus follows mouse
        options: ["0", "1", "2", "3"]
        hint: "0=disabled 1=full 2=loose 3=full+keyboard"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.mouse_refocus
        label: Mouse Refocus
        type: bool
        default: "true"
        description: refocus only on window boundary crossing
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.float_switch_override_focus
        label: Float Switch Focus
        type: enum
        default: "1"
        description: focus behavior on tiled/float toggle
        options: ["0", "1", "2"]
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.special_fallthrough
        label: Special Fallthrough
        type: bool
        default: "false"
        description: focus through special ws with only floats
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.kb_layout
        label: Keyboard Layout
        type: string
        default: us
        description: XKB keyboard layout
        example: "kb_layout = us"
        hint: see /usr/share/X11/xkb/rules/evdev.lst
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.kb_variant
        label: Keyboard Variant
        type: string
        default: ""
        description: XKB layout variant
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.kb_model
        label: Keyboard Model
        type: string
        default: ""
        description: XKB keyboard model
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.kb_options
        label: Keyboard Options
        type: string
        default: ""
        description: XKB keyboard options
        hint: "e.g. caps:escape, compose:ralt"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.kb_rules
        label: Keyboard Rules
        type: string
        default: ""
        description: XKB keyboard rules
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.kb_file
        label: Keyboard File
        type: string
        widget: path
        default: ""
        description: custom .xkb keymap file
        hint: overrides other kb_ settings
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.numlock_by_default
        label: Numlock by Default
        type: bool
        default: "false"
        description: numlock on at startup
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.repeat_rate
        label: Repeat Rate
        type: number
        default: "25"
        description: key repeat rate (per second)
        min: 1
        max: 100
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.repeat_delay
        label: Repeat Delay
        type: number
        default: "600"
        description: key repeat delay (ms)
        min: 100
        max: 2000
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#input"
      - key: input.touchpad.disable_while_typing
        label: Disable While Typing
        type: bool
        default: "true"
        description: disable while typing
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: input.touchpad.natural_scroll
        label: Natural Scroll
        type: bool
        default: "false"
        description: natural (inverted) scroll
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: input.touchpad.scroll_factor
        label: Scroll Factor
        type: number
        default: "1.0"
        description: touchpad scroll multiplier
        min: 0.1
        max: 10
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: input.touchpad.middle_button_emulation
        label: Middle Button Emulation
        type: bool
        default: "false"
        description: LMB+RMB = middle click
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: input.touchpad.tap-to-click
        label: Tap to Click
        type: bool
        default: "true"
        description: 1/2/3-finger tap = LMB/RMB/MMB
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: input.touchpad.tap-and-drag
        label: Tap and Drag
        type: bool
        default: "true"
        description: tap-and-drag gesture
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: input.touchpad.clickfinger_behavior
        label: Clickfinger Behavior
        type: bool
        default: "false"
        description: clickfinger button mapping
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#touchpad"
      - key: gestures.workspace_swipe_distance
        label: Swipe Distance
        type: number
        default: "300"
        description: swipe distance (px)
        min: 50
        max: 1000
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_touch
        label: Swipe Touch
        type: bool
        default: "false"
        description: touchscreen edge swipe
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_invert
        label: Swipe Invert
        type: bool
        default: "true"
        description: invert swipe direction
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_min_speed_to_force
        label: Swipe Min Speed
        type: number
        default: "30"
        description: min speed to force ws change
        min: 0
        max: 200
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_cancel_ratio
        label: Swipe Cancel Ratio
        type: number
        widget: slider
        default: "0.5"
        description: swipe commit threshold
        min: 0
        max: 1
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_create_new
        label: Swipe Create New
        type: bool
        default: "true"
        description: swipe past last ws creates new
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_direction_lock
        label: Direction Lock
        type: bool
        default: "true"
        description: lock direction after threshold
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"
      - key: gestures.workspace_swipe_forever
        label: Swipe Forever
        type: bool
        default: "false"
        description: continuous swipe through workspaces
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#gestures"

  - name: Misc
    key: misc
    fields:
      - key: misc.disable_hyprland_logo
        label: Disable Logo
        type: bool
        default: "false"
        description: disable hyprland logo background
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.disable_splash_rendering
        label: Disable Splash
        type: bool
        default: "false"
        description: disable splash text
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.force_default_wallpaper
        label: Default Wallpaper
        type: number
        default: "-1"
        description: default wallpaper (-1 = random)
        min: -1
        max: 2
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.vfr
        label: VFR
        type: bool
        default: "true"
        description: variable frame rate
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.vrr
        label: VRR
        type: enum
        default: "0"
        description: variable refresh rate (adaptive sync)
        options: ["0", "1", "2", "3"]
        hint: "0=off 1=on 2=fullscreen-only 3=fullscreen+adaptive"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.mouse_move_enables_dpms
        label: Mouse Wakes DPMS
        type: bool
        default: "false"
        description: mouse wakes DPMS
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.key_press_enables_dpms
        label: Key Wakes DPMS
        type: bool
        default: "false"
        description: keypress wakes DPMS
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.animate_manual_resizes
        label: Animate Manual Resizes
        type: bool
        default: "false"
        description: animate manual resizes
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.animate_mouse_windowdragging
        label: Animate Mouse Drag
        type: bool
        default: "false"
        description: animate mouse-dragged windows
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.enable_swallow
        label: Enable Swallow
        type: bool
        default: "false"
        description: window swallowing
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.swallow_regex
        label: Swallow Regex
        type: string
        default: ""
        description: swallower class regex
        hint: "e.g. ^(kitty|Alacritty)$"
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.swallow_exception_regex
        label: Swallow Exception Regex
        type: string
        default: ""
        description: swallow exception title regex
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.focus_on_activate
        label: Focus on Activate
        type: bool
        default: "false"
        description: focus apps on activation request
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.mouse_move_focuses_monitor
        label: Mouse Focuses Monitor
        type: bool
        default: "true"
        description: mouse movement focuses monitor
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.close_special_on_empty
        label: Close Special on Empty
        type: bool
        default: "true"
        description: close special ws when empty
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.background_color
        label: Background Color
        type: color
        default: "0x111111"
        description: fallback background color
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.disable_autoreload
        label: Disable Autoreload
        type: bool
        default: "false"
        description: disable config autoreload
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.layers_hog_keyboard_focus
        label: Layers Hog Focus
        type: bool
        default: "true"
        description: layers retain keyboard focus on mouse move
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
      - key: misc.middle_click_paste
        label: Middle Click Paste
        type: bool
        default: "true"
        description: middle-click paste (primary selection)
        doc_url: "https://wiki.hypr.land/Configuring/Variables/#misc"
