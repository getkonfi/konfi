app: konfi
format: yaml
docs_url: https://github.com/getkonfi/konfi/blob/main/README.md
hints:
  - konfi's own settings
  - theme changes apply immediately
sections:
  - name: Appearance
    key: ""
    fields:
      - key: theme
        label: Theme
        type: enum
        default: rose pine
        description: color palette for the TUI
        options:
          - gh-dash
          - catppuccin
          - tomorrow night
          - tokyonight
          - gruvbox
          - monokai
          - nord
          - rose pine
          - solarized
          - oxocarbon
      - key: nerd_font
        label: Nerd Font
        type: bool
        default: "true"
        description: use Nerd Font glyphs for icons (disable for plain ASCII fallback)
  - name: Navigation
    key: ""
    fields:
      - key: browse_loads_app
        label: Browse Loads App
        type: bool
        default: "false"
        description: load app content while browsing the sidebar instead of requiring Enter
  - name: Backups
    key: ""
    fields:
      - key: backup_limit
        label: Backup Limit
        type: number
        default: "5"
        description: number of konfi backup files to retain per config (0 disables backups)
        min: 0
        max: 100
