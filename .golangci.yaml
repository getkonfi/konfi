version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - errorlint
    - copyloopvar
    - bodyclose

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    revive:
      rules:
        - name: exported
          disabled: true
    misspell:
      locale: US

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - unused
