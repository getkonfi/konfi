name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            src/go.sum
            tools/schemaverify/go.sum
            tools/upstreamcheck/go.sum

      - name: install tools
        run: make tools

      - name: lint
        run: make lint

      - name: test
        run: make test

      - name: arch container e2e
        run: make e2e

  release:
    needs: checks
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.checks.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            src/go.sum
            tools/schemaverify/go.sum
            tools/upstreamcheck/go.sum

      - name: setup nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
